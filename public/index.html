    // --- Unified Tap List Handler ---
    async function openTapList(jsonPath, breweryName) {
        const modal = document.getElementById('tapListModal'); // Matches your HTML ID
        const content = document.getElementById('modalContent'); // Matches your HTML ID
        const title = document.getElementById('modalTitle');     // Matches your HTML ID
        
        modal.style.display = 'block';
        title.innerText = `${breweryName} Tap List`;
        content.innerHTML = '<div style="text-align:center;">Loading...</div>';

        try {
            const response = await fetch(jsonPath);
            const data = await response.json();

            // ROUTING: Handle Image-based vs Text-based data
            if (data.isImageMenu) {
                content.innerHTML = `
                    <div style="text-align:center;">
                        <img src="${data.menuImageUrl}" style="width:100%; max-width:600px; border-radius:8px;" alt="Menu" />
                        <p style="font-size:0.7rem; color:#888; margin-top:10px;">Updated: ${data.lastUpdated}</p>
                    </div>
                `;
            } else if (data["Beer on tap"] && data["Beer on tap"].length > 0) {
                content.innerHTML = data["Beer on tap"].map(beer => `
                    <div style="padding: 10px; border-bottom: 1px solid #333;">
                        <h3 style="margin:0; font-size:1.1rem; color:#ffcc00;">${beer.name} <span style="font-size:0.9rem; color:#aaa;">${beer.abv}</span></h3>
                        <p style="margin:2px 0 0; color:#ddd; font-size:0.9rem;">${beer.style}</p>
                    </div>
                `).join('');
            } else {
                content.innerHTML = '<p style="text-align:center;">No beers currently on tap.</p>';
            }
        } catch (error) {
            content.innerHTML = '<p style="text-align:center; color:red;">Error loading tap list.</p>';
        }
    }

    function closeModal() {

            // Centralized Mapping
            if (item.brewery.toLowerCase().includes('moniker')) {
                tapListHtml = `<button onclick="openTapList('/data/moniker-menu.json', 'Moniker Brewery')" class="tap-list-btn">📝 VIEW TAP LIST</button>`;
            } else if (item.brewery.toLowerCase().includes('foolproof')) {
                tapListHtml = `<button onclick="openTapList('/data/foolproof-menu.json', 'Foolproof Brewing')" class="tap-list-btn">📝 VIEW TAP LIST</button>`;
            } else if (item.brewery.toLowerCase().includes('phantom')) {
                tapListHtml = `<button onclick="openTapList('/data/phantom-menu.json', 'Phantom Farms')" class="tap-list-btn">📝 VIEW TAP LIST</button>`;
            } else if (item.brewery.toLowerCase().includes('uncommon')) {
                tapListHtml = `<button onclick="openTapList('/data/uncommon-pair-menu.json', 'Uncommon Pair')" class="tap-list-btn">📝 VIEW TAP LIST</button>`;
            } else if (info && info.tapListUrl) {
                tapListHtml = `<a href="${info.tapListUrl}" target="_blank" class="tap-list-btn">📝 View Tap List</a>`;
            }

            card.innerHTML = `
                <span class="truck-name">${item.brewery}</span>
                <span style="color:#aaa; font-size:0.9rem;">${item.truck}</span>
                ${tapListHtml}
            `;
            container.appendChild(card);
        });
    }
