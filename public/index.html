    const normalize = (d) => {
        if (!d) return "";
        const match = d.trim().match(/^(\d{1,2})\/(\d{1,2})/);
        return match ? `${Number(match[1])}/${Number(match[2])}` : "";
    };

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 3958.8; // Radius of Earth in miles
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function checkIfOpen(hoursString) {
        if (!hoursString || hoursString.toLowerCase() === "closed") return false;
        const now = new Date();
        const currentTimeInMinutes = (now.getHours() * 60) + now.getMinutes();
        const parts = hoursString.toLowerCase().replace(/\s+/g, '').split('-');
        if (parts.length !== 2) return false;

        function parseToMinutes(t) {
            const match = t.match(/(\d+)(?::(\d+))?\s*(am|pm)?/);
            if (!match) return 0;
            let hours = parseInt(match[1]);
            let minutes = match[2] ? parseInt(match[2]) : 0;
            let ampm = match[3] || (hours >= 11 && hours < 12 ? 'am' : 'pm');
            if (ampm === 'pm' && hours < 12) hours += 12;
            if (ampm === 'am' && hours === 12) hours = 0;
            return (hours * 60) + minutes;
        }
        return currentTimeInMinutes >= parseToMinutes(parts[0]) && currentTimeInMinutes < parseToMinutes(parts[1]);
    }

    function switchTab(type) {
        currentTab = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`${type}-tab`).classList.add('active');
        const activePill = document.querySelector('.date-pill.active');
        if (activePill) renderDate(activePill.dataset.date);
    }

    function generateDatePicker() {
        const picker = document.getElementById('date-picker');
        const today = new Date();
        for (let i = 0; i < 7; i++) {
            const d = new Date();
            d.setDate(today.getDate() + i);
            const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
            const dateNum = d.getDate();
            const normDate = `${d.getMonth() + 1}/${dateNum}`;
            
            const pill = document.createElement('div');
            pill.className = `date-pill ${i === 0 ? 'active' : ''}`;
            pill.dataset.date = normDate;
            pill.onclick = () => {
                document.querySelectorAll('.date-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                renderDate(normDate);
            };
            pill.innerHTML = `<span>${dayName}</span><strong>${dateNum}</strong>`;
            picker.appendChild(pill);
        }
    }

    function renderDate(selectedNormDate) {
    const container = document.getElementById('truck-container');
    container.innerHTML = '';
    const [m, d] = selectedNormDate.split('/');
    const selectedDay = new Date(new Date().getFullYear(), parseInt(m) - 1, parseInt(d)).getDay();
    const isActuallyToday = selectedNormDate === `${new Date().getMonth() + 1}/${new Date().getDate()}`;

    // 1. Initial filter for trucks scheduled on this specific date
    let listToRender = allTruckData
        .filter(t => normalize(t.start) === selectedNormDate)
        .map(t => {
            const info = breweryData[t.brewery];
            let dist = Infinity;
            if (userCoords && info) dist = getDistance(userCoords.lat, userCoords.lng, info.lat, info.lng);
            return { 
                ...t, 
                distance: dist, 
                isOpenNow: info ? checkIfOpen(info.hours[selectedDay]) : false,
                hasKitchen: info ? info.hasKitchen : false,
                rawHours: info ? info.hours[selectedDay] : "Closed"
            };
        });

    if (currentTab === 'beer') {
        // 2. BEER TAB LOGIC: Show all breweries scheduled OR not scheduled, but NOT if they are closed today
        const scheduledBreweryNames = new Set(listToRender.map(t => t.brewery));
        
        Object.keys(breweryData).forEach(bName => {
            const info = breweryData[bName];
            const todayHours = info.hours[selectedDay];

            // Only add if brewery isn't already in list AND isn't "Closed"
            if (!scheduledBreweryNames.has(bName) && todayHours.toLowerCase() !== "closed") {
                let dist = Infinity;
                if (userCoords) dist = getDistance(userCoords.lat, userCoords.lng, info.lat, info.lng);
                listToRender.push({
                    brewery: bName,
                    truck: "Taproom Hours",
                    distance: dist,
                    isOpenNow: checkIfOpen(todayHours),
                    hasKitchen: info.hasKitchen,
                    rawHours: todayHours
                });
            }
        });

        // Final Beer Tab cleanup: Remove anything that ended up in the list but is closed
        listToRender = listToRender.filter(item => item.rawHours.toLowerCase() !== "closed");

    } else {
        // 3. FOOD TAB LOGIC: Show scheduled trucks AND breweries with kitchens
        const kitchenBreweries = Object.keys(breweryData)
            .filter(bName => {
                const info = breweryData[bName];
                return info.hasKitchen && info.hours[selectedDay].toLowerCase() !== "closed";
            })
            .map(bName => {
                const info = breweryData[bName];
                let dist = Infinity;
                if (userCoords) dist = getDistance(userCoords.lat, userCoords.lng, info.lat, info.lng);
                return {
                    brewery: bName,
                    truck: "Full Kitchen On-Site",
                    distance: dist,
                    isOpenNow: checkIfOpen(info.hours[selectedDay]),
                    hasKitchen: true,
                    rawHours: info.hours[selectedDay]
                };
            });

        // Combine both sources and remove duplicates (preferring scheduled trucks over generic "Kitchen" label)
        const combined = [...listToRender, ...kitchenBreweries];
        listToRender = Array.from(new Map(combined.map(item => [item.brewery, item])).values());
        
        // Ensure we only show items with food
        listToRender = listToRender.filter(t => t.hasKitchen || (t.truck && t.truck !== "No Truck Scheduled" && t.truck !== "Taproom Hours"));
    }

    // Sort by distance and render
    listToRender.sort((a, b) => a.distance - b.distance);

    if (listToRender.length === 0) {
        container.innerHTML = `<p style="text-align:center; color:#888; margin-top:40px;">No options found for this date.</p>`;
        return;
    }

       let tapListHtml = '';
if (item.brewery.toLowerCase().includes('uncommon')) {

} else if (info && info.tapListUrl) {

            <div style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">Hours: ${item.rawHours}</div>
            <span class="truck-name">${mainLabel}</span>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span class="status-badge" style="background: ${statusColor};">${statusText}</span>
                ${item.hasKitchen ? '<span class="status-badge" style="background: #0277bd;">Food On-Site</span>' : ''}
            </div>
            ${tapListHtml}
        `;
        container.appendChild(card);
    });
}






 async function openTapList(jsonPath, breweryName) {
    const modal = document.getElementById('tapListModal');
    const content = document.getElementById('modalContent');
    const title = document.getElementById('modalTitle');
    
    title.innerText = `${breweryName} Menu`;
    modal.style.display = "block";
    content.innerHTML = "Loading...";

    try {
        const response = await fetch(jsonPath);
        const data = await response.json();

        // 1. Handle Images
        if (data.isImageMenu) {
            content.innerHTML = `
                <div style="text-align:center; padding: 20px;">
                    <img src="${data.menuImageUrl}" style="width:100%; max-width:600px; border-radius:8px; border: 1px solid #444;" alt="Menu" />
                    <p style="font-size:0.8rem; color:#888; margin-top:10px;">Last updated: ${data.lastUpdated}</p>
                </div>
            `;
            return;
        }

        // 2. Handle Nested Format (On Tap/Can Pours)
        if (data["Beer on tap"] && typeof data["Beer on tap"] === 'object' && !Array.isArray(data["Beer on tap"])) {
            let htmlContent = "";
            for (const [category, items] of Object.entries(data["Beer on tap"])) {
                htmlContent += `<h3 style="color: #ffc107; border-bottom: 1px solid #444; margin-top: 20px;">${category}</h3>`;
                htmlContent += items.map(b => `
                    <div style="padding:10px; border-bottom:1px solid #333;">
                        <strong>${b.name}</strong> - ${b.abv}<br>
                        <div style="font-size:0.8rem; color:#aaa;">${b.description}</div>
                    </div>
                `).join('');
            }
            content.innerHTML = htmlContent;
            return;
        }

        // 3. Handle Grouped (Food) or Flat (Old Beer)
        const isGrouped = data.hasOwnProperty("Food on site");
        const displayData = data["Food on site"] || data["Beer on tap"] || data["Beer On Tap"] || data.beers || [];

        if (displayData.length === 0) {
            content.innerHTML = "<p style='text-align:center;'>No items available.</p>";
        } else if (isGrouped) {
            content.innerHTML = displayData.map(section => `
                <div style="margin-bottom: 20px;">
                    <h3 style="color: #ffc107; border-bottom: 1px solid #444; margin-top: 20px;">${section.header}</h3>
                    ${section.items.map(item => `
                        <div style="padding:10px; border-bottom:1px solid #333;">
                            <div style="display:flex; justify-content:space-between;"><strong>${item.name}</strong><span>${item.price}</span></div>
                            <div style="font-size:0.8rem; color:#aaa;">${item.description}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        } else {
            content.innerHTML = displayData.map(b => `
                <div style="padding:10px; border-bottom:1px solid #333;">
                    <strong>${b.name}</strong> - ${b.abv}
                    <div style="font-size:0.8rem; color:#aaa;">${b.description}</div>
                </div>
            `).join('');
        }
    } catch (e) {
        content.innerHTML = "Failed to load.";
        console.error("Menu Load Error:", e);
    }
}
